# ──────────────────────────────────────────────
#  SSRF Labs  -  Docker Compose
# ──────────────────────────────────────────────
#  Single container that runs:
#    - web-app   on 0.0.0.0:8000  (exposed to host)
#    - internal  on 127.0.0.1:80  (only reachable via SSRF)
# ──────────────────────────────────────────────

services:

  web-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: ssrf-web-app
    ports:
      - "8000:8000"
    restart: unless-stopped
